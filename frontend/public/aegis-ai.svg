<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" fill="none">
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(76 64) rotate(55) scale(240)">
      <stop stop-color="#111827"/>
      <stop offset="0.55" stop-color="#050A14"/>
      <stop offset="1" stop-color="#020617"/>
    </radialGradient>
    <linearGradient id="glow" x1="48" y1="36" x2="220" y2="228" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60A5FA" stop-opacity="0.65"/>
      <stop offset="0.55" stop-color="#3B82F6" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#2563EB" stop-opacity="0.15"/>
    </linearGradient>
    <linearGradient id="core" x1="92" y1="88" x2="172" y2="176" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="0.45" stop-color="#2563EB"/>
      <stop offset="1" stop-color="#1E40AF"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- Background card -->
  <rect x="12" y="12" width="232" height="232" rx="56" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <path d="M48 92c22-40 58-56 96-56 44 0 84 26 96 68 12 40-2 92-44 120-44 30-112 22-146-18-28-34-26-82-2-114z"
        fill="url(#glow)" filter="url(#soft)" opacity="0.9"/>

  <!-- Shield / mask -->
  <path d="M128 52c-36 0-66 30-66 66v36c0 12 6 22 16 28l40 26c6 4 14 4 20 0l40-26c10-6 16-16 16-28v-36c0-36-30-66-66-66z"
        fill="rgba(255,255,255,0.10)" stroke="rgba(255,255,255,0.12)" stroke-width="2"/>

  <!-- "Lens" core -->
  <circle cx="128" cy="132" r="42" fill="url(#core)"/>
  <circle cx="128" cy="132" r="20" fill="rgba(255,255,255,0.90)"/>
  <circle cx="128" cy="132" r="10" fill="#0B1220"/>

  <!-- Highlights -->
  <path d="M104 116c10-14 24-22 40-22" stroke="rgba(255,255,255,0.55)" stroke-width="6" stroke-linecap="round"/>
  <path d="M96 150c8 18 24 30 44 34" stroke="rgba(255,255,255,0.18)" stroke-width="6" stroke-linecap="round"/>

  <!-- Subtle frame -->
  <rect x="12" y="12" width="232" height="232" rx="56" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>
</svg>

